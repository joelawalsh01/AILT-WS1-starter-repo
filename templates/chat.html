<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor: {{ topic }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 700px;
        }
        h1 {
            text-align: center;
            margin-bottom: 4px;
            color: #333;
            font-size: 1.4em;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 16px;
            font-size: 0.9em;
        }
        #chat-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            height: 500px;
            overflow-y: auto;
            padding: 16px;
            margin-bottom: 12px;
        }
        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.5;
        }
        .user {
            background: #007bff;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .assistant {
            background: #e9ecef;
            color: #333;
        }
        .input-row {
            display: flex;
            gap: 8px;
        }
        #user-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
        }
        #send-btn {
            background: #007bff;
            color: white;
        }
        #send-btn:disabled {
            background: #ccc;
        }
        #reset-btn {
            background: #dc3545;
            color: white;
            margin-top: 8px;
            padding: 8px 16px;
            font-size: 0.85em;
        }
        .controls {
            text-align: center;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Tutor: {{ topic }}</h1>
        <p class="subtitle">{{ num_questions }} questions loaded &middot; Powered by Gemini 2.5 Flash</p>

        <div id="chat-box"></div>

        <div class="input-row">
            <input type="text" id="user-input" placeholder="Type your message..." autofocus
                   onkeydown="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>

        <div class="controls">
            <button id="reset-btn" onclick="resetChat()">Reset Conversation</button>
        </div>
    </div>

    <script>
        function addMessage(text, role) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';
            document.getElementById('send-btn').disabled = true;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: message})
                });
                const data = await response.json();
                addMessage(data.reply, 'assistant');
            } catch (error) {
                addMessage('Error: Could not reach the server.', 'assistant');
            }

            document.getElementById('send-btn').disabled = false;
            input.focus();
        }

        async function resetChat() {
            await fetch('/reset', {method: 'POST'});
            document.getElementById('chat-box').innerHTML = '';
            addMessage('Conversation reset. Say hello to start again!', 'assistant');
        }
    </script>
</body>
</html>
